name: Build .dat files

on:
  push:
    branches:
      - master
    paths:
      - "geoip_config.json"
  repository_dispatch:
    types: [trigger-dat-build]
  workflow_dispatch:
    inputs:
      message:
        description: 'Release message'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout config
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            geoip_config.json
          sparse-checkout-cone-mode: false
          path: publish

      - name: Checkout lists
        uses: actions/checkout@v6
        with:
          repository: itdoginfo/allow-domains
          sparse-checkout: |
            Russia/inside-raw.lst
            Russia/outside-raw.lst
            Ukraine/inside-raw.lst
            Categories
            Services
            Subnets
          sparse-checkout-cone-mode: false
          path: lists

      - name: Checkout geosite builder
        uses: actions/checkout@v6
        with:
          repository: v2fly/domain-list-community
          sparse-checkout: |
            main.go
            go.mod
            go.sum
            internal
          sparse-checkout-cone-mode: false
          path: geosite

      - name: Checkout geoip builder
        uses: actions/checkout@v6
        with:
          repository: v2fly/geoip
          path: geoip

      - name: Prepare lists
        run: |
          cd lists
          mkdir -p Countries
          ln "Russia/inside-raw.lst" "Countries/russia-inside.lst"
          ln "Russia/outside-raw.lst" "Countries/russia-outside.lst"
          ln "Ukraine/inside-raw.lst" "Countries/ukraine-inside.lst"
          input="../geosite/input"
          mkdir -p "${input}"/{allow-domains,allow-categories,allow-countries,allow-services}
          declare -A groups=(
            ["Categories"]="-domains"
            ["Countries"]=""
            ["Services"]="-domains"
          )
          for group in "${!groups[@]}"; do
            for lst in ./"$group"/*; do
              [[ -f "$lst" ]] || continue
              list="$(basename "$lst" .lst | tr '_' '-')"
              [[ "$list" == "${list,,}" ]] || continue
              dest="${input}/${list}${groups[$group]}"
              mkdir -p "$dest"
              ln "$lst" "${dest}/list"
              ln "$lst" "${input}/allow-${group,,}/${list}"
              ln "$lst" "${input}/allow-domains/${list}"
            done
          done
          ip_input="../geoip/input"
          mkdir -p "$ip_input"
          for lst in ./Subnets/*/*; do
            [[ -f "$lst" ]] || continue
            list="$(basename "$lst" .lst | tr '_' '-')"
            [[ "$list" == "${list,,}" ]] || continue
            cat "$lst" >> "${ip_input}/${list}"
          done

      - name: Setup Go for geosite builder
        uses: actions/setup-go@v6
        with:
          go-version-file: geosite/go.mod
          cache-dependency-path: geosite/go.sum

      - name: Build domains .dat files
        run: |
          cd geosite
          for category in ./input/*/; do
            go run ./ \
              --datapath="$category" \
              --outputname="$(basename "$category").dat" \
              --outputdir="../publish/"
          done

      - name: Setup Go for geoip builder
        uses: actions/setup-go@v6
        with:
          go-version-file: geoip/go.mod
          cache-dependency-path: geoip/go.sum

      - name: Build subnets .dat files
        run: |
          cd geoip
          mkdir output
          go run ./ -c "../publish/geoip_config.json"
          for dat in ./output/*.dat; do
            [[ -f "$dat" ]] || continue
            ln "$dat" "../publish/$(basename "$dat" .dat)-subnets.dat"
          done

      - name: Release and upload assets
        id: release
        run: |
          cd publish
          RELEASE_NAME="$(date +'%Y-%m-%d_%H-%M-%S')"
          gh release create "$RELEASE_NAME" -t "$RELEASE_NAME" -n "${{ env.RELEASE_MSG }}" ./*.dat
          echo "version=$RELEASE_NAME" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_MSG: "${{
            inputs.message ||
            github.event.head_commit.message ||
            format('new lists release: {0}', github.event.client_payload.version) }}"
          
      - name: Trigger Happ routing rebuild
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.HAPP_ROUTING_TOKEN }}
          repository: KazZzeL/allow-domains-happ-routing
          event-type: trigger-routing-build
          client-payload: '{"version": "${{ steps.release.outputs.version }}"}'
          